name: daybreak

services:
  postgres:
    image: ${DAYBREAK_POSTGRES_IMAGE:-docker.m.daocloud.io/postgres:16-alpine}
    container_name: daybreak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DAYBREAK_DB_NAME:-daybreak}
      POSTGRES_USER: ${DAYBREAK_DB_USER:-root}
      POSTGRES_PASSWORD: ${DAYBREAK_DB_PASSWORD:?DAYBREAK_DB_PASSWORD is required}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "127.0.0.1:${DAYBREAK_DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 30

  sandbox-image:
    image: ${DAYBREAK_SANDBOX_IMAGE:-ghcr.nju.edu.cn/linyisheng1/daybreak-sandbox:latest}
    profiles: ["sandbox-image"]
    entrypoint: ["/bin/true"]
    restart: "no"

volumes:
  postgres-data:
    name: ${DAYBREAK_DB_VOLUME:-daybreak-pgdata}
