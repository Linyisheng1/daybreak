name: Feature request
description: 提议一个能改善安全评估工作流的新功能
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 需要解决的问题
      description: 请描述实际工作场景、当前阻碍和受影响的使用者
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 你希望 Daybreak 如何改善这个流程？
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 相关模块
      options:
        - 工作台与智能体
        - 项目与拓扑图
        - 沙箱与远程桌面
        - 主机与出口代理
        - 结果质量与报告
        - 安装与部署
        - 文档与社区
        - 新模块
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已尝试的替代方式
      description: 可选。说明目前如何绕过这个问题，以及为什么不够理想
  - type: checkboxes
    id: checks
    attributes:
      label: 提交确认
      options:
        - label: 该建议用于合法、明确授权的安全工作
          required: true
        - label: 我已搜索现有 Issue 和路线图
          required: true
